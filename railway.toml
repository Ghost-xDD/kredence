[build]
builder = "NIXPACKS"
buildCommand = "pnpm --filter @credence/types build && pnpm --filter @credence/storage build && pnpm --filter @credence/agents build && pnpm --filter @credence/server build"

[deploy]
startCommand = "node packages/server/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
# Redeploy whenever any package that is bundled into the server changes
watchPaths = [
  "packages/server/**",
  "packages/agents/**",
  "packages/storage/**",
  "packages/types/**",
  "railway.toml",
]
